<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI×Democracy.FYI — A Resource Map for Who's Working in This Space</title>
  <meta name="description" content="An ecosystem map of orgs, people, and papers focused on the intersection of AI &amp; Democracy">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AI×Democracy.FYI">
  <meta property="og:description" content="An ecosystem map of orgs, people, and papers focused on the intersection of AI &amp; Democracy">
  <meta property="og:url" content="https://aixdemocracy.fyi">
  <meta property="og:image" content="https://alignedgov.pages.dev/og-image.png">
  <meta property="og:site_name" content="AI×Democracy.FYI">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AI×Democracy.FYI">
  <meta name="twitter:description" content="An ecosystem map of orgs, people, and papers focused on the intersection of AI &amp; Democracy">
  <meta name="twitter:image" content="https://alignedgov.pages.dev/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="stylesheet" href="styles.css">
  <style>
    /* ─── Newsletter Signup ──────────────────────────────────────────── */
    .newsletter-signup {
      max-width: 440px;
      margin: 1.25rem auto 0;
    }

    .newsletter-form {
      display: flex;
      gap: 0.5rem;
    }

    .newsletter-form input[type="email"] {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: var(--font-sans);
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s;
    }

    .newsletter-form input[type="email"]:focus {
      border-color: var(--color-primary);
    }

    .newsletter-btn {
      flex-shrink: 0;
      padding: 0.65rem 1.25rem;
      font-size: 0.9rem;
    }

    .newsletter-hint {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      margin-top: 0.5rem;
      text-align: center;
    }

    .newsletter-msg {
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      min-height: 1.25em;
    }

    .newsletter-msg.success { color: #16a34a; }
    .newsletter-msg.error { color: #dc2626; }

    .newsletter-msg:empty { display: none; }

    @media (max-width: 480px) {
      .newsletter-form {
        flex-direction: column;
      }
    }

    /* ─── Org Card Layout ─────────────────────────────────────────────── */
    .org-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .org-card {
      display: flex;
      gap: 1.5rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.5rem;
    }

    /* Left side: org identity (clickable) */
    .org-identity {
      flex: 0 0 280px;
      min-width: 0;
      text-decoration: none;
      color: inherit;
      padding: 0.75rem;
      margin: -0.75rem;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
      display: block;
    }

    a.org-identity:hover {
      background: rgba(37, 99, 214, 0.09);
      text-decoration: none;
    }

    .org-header {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .org-favicon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .org-favicon img {
      width: 20px;
      height: 20px;
      border-radius: 3px;
    }

    .org-name {
      font-size: 1.05rem;
      font-weight: 650;
      color: var(--color-text);
      text-decoration: none;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


    .org-desc {
      font-size: 0.82rem;
      color: var(--color-text-secondary);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .org-url {
      font-size: 0.75rem;
      color: var(--color-primary);
      margin-bottom: 0.6rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    .org-badge {
      display: inline-block;
      padding: 0.12rem 0.5rem;
      border-radius: 50px;
      background: var(--color-badge-bg);
      color: var(--color-badge-text);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
    }

    .org-people-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .org-people-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .org-people-list li {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    /* Right side: stacked link list */
    .org-links {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .org-link-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.6rem 0.5rem;
      margin: 0 -0.5rem;
      border-bottom: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: inherit;
      min-width: 0;
      transition: background 0.15s;
    }

    .org-link-item:last-child {
      border-bottom: none;
    }

    .org-link-item:hover {
      background: rgba(37, 99, 214, 0.09);
      text-decoration: none;
    }

    .org-link-favicon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .org-link-favicon img {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    .org-link-text {
      flex: 1;
      min-width: 0;
    }

    .org-link-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.15rem;
    }

    .org-link-source {
      font-size: 0.68rem;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .org-link-badge {
      display: inline-block;
      padding: 0.08rem 0.4rem;
      border-radius: 50px;
      background: var(--color-badge-bg);
      color: var(--color-badge-text);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .org-link-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .org-link-desc {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .org-section-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 0.75rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border-light);
    }

    /* ─── Deadlines Section ──────────────────────────────────────────── */
    .deadlines-section {
      margin-bottom: 2.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--color-primary);
    }

    .deadlines-heading {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .deadline-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.6rem 0.5rem;
      margin: 0 -0.5rem;
      border-bottom: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .deadline-item:last-child {
      border-bottom: none;
    }

    .deadline-item:hover {
      background: rgba(37, 99, 214, 0.09);
      text-decoration: none;
    }

    .deadline-favicon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .deadline-favicon img {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    .deadline-text {
      flex: 1;
      min-width: 0;
    }

    .deadline-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .deadline-desc {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .deadline-date {
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--color-primary);
      white-space: nowrap;
      margin-top: 2px;
    }

    .deadline-date.passed {
      color: var(--color-text-muted);
    }

    /* Responsive: stack on smaller screens */
    @media (max-width: 768px) {
      .org-card {
        flex-direction: column;
        gap: 1rem;
      }
      .org-identity {
        flex: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-brand" id="nav-brand"></a>
      <ul class="nav-links">
        <li><a href="/" class="active" data-icon="⌂"><span>Home</span></a></li>
        <li><a href="/about.html" data-icon="?"><span>About</span></a></li>
        <li><a href="/submit.html" data-icon="+"><span>Submit a Resource</span></a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <div class="hero">
      <h1 id="site-heading"></h1>
      <p class="subheading" id="site-subheading"></p>
      <p class="description" id="site-description"></p>

      <!-- Newsletter Signup -->
      <div class="newsletter-signup">
        <form id="newsletter-form" class="newsletter-form">
          <input type="email" id="newsletter-email" placeholder="your@email.com" required autocomplete="email" aria-label="Email address">
          <button type="submit" class="btn-primary newsletter-btn">Subscribe</button>

      </div>

    <!-- Deadlines -->
    <div class="deadlines-section" id="deadlines-section" style="display: none;"></div>

    <!-- Loading State -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>Loading ecosystem...</p>
    </div>

    <!-- Org List -->
    <div class="org-list" id="org-list" style="display: none;"></div>

    <!-- Submit CTA -->
    <div style="text-align: center; margin: 3rem 0 1rem;">
      <a href="/submit.html" class="btn-primary">Submit a Resource
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>

  <footer class="site-footer">
    <p id="site-footer"></p>
  </footer>

  <script>
    var WORKER_URL = "https://alignedgov-worker.seanahrens.workers.dev";

    function faviconUrl(url) {
      try {
        var domain = new URL(url).hostname;
        return "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(domain) + "&sz=64";
      } catch { return ""; }
    }

    function getDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ""); }
      catch { return url; }
    }

    function isSameText(a, b) {
      if (!a || !b) return false;
      var norm = function(s) { return s.trim().toLowerCase().replace(/[.\s]+$/g, ""); };
      return norm(a) === norm(b);
    }

    async function init() {
      try {
        var resp = await fetch(WORKER_URL + "/api/links");
        var data = await resp.json();

        // Apply dynamic config
        var config = data.config || {};
        if (config.title) {
          document.getElementById("nav-brand").textContent = config.title;
          document.title = config.title + (config.subheading ? " — " + config.subheading : "");
        }
        if (config.heading) document.getElementById("site-heading").textContent = config.heading;
        if (config.subheading) document.getElementById("site-subheading").textContent = config.subheading;
        if (config.description) document.getElementById("site-description").textContent = config.description;
        if (config.footer) document.getElementById("site-footer").textContent = config.footer;

        var deadlines = data.deadlines || [];
        renderDeadlines(deadlines);

        var orgs = data.orgs || [];
        var links = data.links || [];

        renderOrgView(orgs, links);
      } catch (err) {
        document.getElementById("loading").innerHTML =
          "<p>Failed to load ecosystem. Please try again later.</p>";
      }
    }

    function parseDeadlineDate(str) {
      // Handles "Mar 16", "Mar 16, 2026", "2026-03-16" etc.
      var MONTH_MAP = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
      var s = (str || "").trim();

      // Try ISO format first (2026-03-16)
      var iso = new Date(s + "T23:59:59");
      if (!isNaN(iso.getTime()) && /^\d{4}-\d{2}-\d{2}$/.test(s)) return iso;

      // Try "Mon DD" or "Mon DD, YYYY"
      var m = s.match(/^([A-Za-z]+)\s+(\d{1,2})(?:\s*,?\s*(\d{4}))?$/);
      if (!m) return null;
      var monthIdx = MONTH_MAP[m[1].toLowerCase().slice(0, 3)];
      if (monthIdx === undefined) return null;
      var day = parseInt(m[2], 10);
      var year = m[3] ? parseInt(m[3], 10) : new Date().getFullYear();
      var date = new Date(year, monthIdx, day, 23, 59, 59);
      // If no year given and the date is > 6 months in the past, assume next year
      if (!m[3] && date < new Date(Date.now() - 180 * 24 * 60 * 60 * 1000)) {
        date.setFullYear(date.getFullYear() + 1);
      }
      return date;
    }

    function renderDeadlines(deadlines) {
      var now = new Date();
      var sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
      var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      // Parse deadlines, filter out > 1 week passed
      var items = [];
      deadlines.forEach(function(d) {
        var date = parseDeadlineDate(d.deadline);
        if (!date) return;
        if (date < sevenDaysAgo) return;
        var passed = date < now;
        var label = MONTHS[date.getMonth()] + " " + date.getDate();
        if (passed) label += " (passed)";
        items.push({ url: d.url, title: d.title, description: d.description, site_name: d.site_name, date: date, label: label, passed: passed });
      });

      if (items.length === 0) return;

      // Sort by deadline ascending
      items.sort(function(a, b) { return a.date - b.date; });

      var section = document.getElementById("deadlines-section");
      section.style.display = "block";

      var heading = document.createElement("div");
      heading.className = "deadlines-heading";
      heading.textContent = "Opportunities \u2014 Upcoming Deadlines";
      section.appendChild(heading);

      items.forEach(function(item) {
        var a = document.createElement("a");
        a.className = "deadline-item";
        a.href = item.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        // Favicon
        var favWrap = document.createElement("div");
        favWrap.className = "deadline-favicon";
        var favImg = document.createElement("img");
        favImg.src = faviconUrl(item.url);
        favImg.alt = "";
        favImg.loading = "lazy";
        favImg.onerror = function() { favImg.style.display = "none"; };
        favWrap.appendChild(favImg);
        a.appendChild(favWrap);

        // Text
        var text = document.createElement("div");
        text.className = "deadline-text";

        var title = document.createElement("div");
        title.className = "deadline-title";
        title.textContent = item.title || getDomain(item.url);
        text.appendChild(title);

        if (item.description && !isSameText(item.description, item.title)) {
          var desc = document.createElement("div");
          desc.className = "deadline-desc";
          desc.textContent = item.description;
          text.appendChild(desc);
        }

        a.appendChild(text);

        // Date badge
        var dateBadge = document.createElement("div");
        dateBadge.className = "deadline-date" + (item.passed ? " passed" : "");
        dateBadge.textContent = item.label;
        a.appendChild(dateBadge);

        section.appendChild(a);
      });
    }

    function renderOrgView(orgs, links) {
      var container = document.getElementById("org-list");
      var loading = document.getElementById("loading");
      loading.style.display = "none";
      container.style.display = "flex";

      // Build a map of org URL → links
      // Normalize URLs for matching (trim trailing slashes)
      function normalizeUrl(u) {
        return (u || "").trim().replace(/\/+$/, "").toLowerCase();
      }

      var orgLinkMap = {};
      var orphanLinks = [];

      // Index all org URLs
      var orgUrlSet = new Set();
      orgs.forEach(function(org) {
        var key = normalizeUrl(org.url);
        orgUrlSet.add(key);
        orgLinkMap[key] = [];
      });

      // Separate editor links from the rest
      var editorLinks = [];
      var nonEditorLinks = [];
      links.forEach(function(link) {
        if ((link.category || "").toLowerCase() === "editor") {
          editorLinks.push(link);
        } else {
          nonEditorLinks.push(link);
        }
      });

      // Assign non-editor links to orgs
      nonEditorLinks.forEach(function(link) {
        if (link.org) {
          var key = normalizeUrl(link.org);
          if (orgLinkMap[key]) {
            orgLinkMap[key].push(link);
          } else {
            orphanLinks.push(link);
          }
        } else {
          orphanLinks.push(link);
        }
      });

      // Catalog heading
      var catalogLabel = document.createElement("div");
      catalogLabel.className = "org-section-label";
      catalogLabel.textContent = "Catalog";
      container.appendChild(catalogLabel);

      // Render each org
      orgs.forEach(function(org) {
        var key = normalizeUrl(org.url);
        var orgLinks = orgLinkMap[key] || [];
        container.appendChild(createOrgCard(org, orgLinks));
      });

      // Render orphan links in a catch-all section
      if (orphanLinks.length > 0) {
        var label = document.createElement("div");
        label.className = "org-section-label";
        label.textContent = "Independent Resources";
        container.appendChild(label);

        var independentOrg = {
          url: null,
          title: "Independent",
          description: "Resources not affiliated with a specific organization.",
          people: [],
          category: null,
        };
        container.appendChild(createOrgCard(independentOrg, orphanLinks));
      }

      // Render editor writings section
      if (editorLinks.length > 0) {
        var edLabel = document.createElement("div");
        edLabel.className = "org-section-label";
        edLabel.textContent = "Editor Writings";
        container.appendChild(edLabel);

        var editorOrg = {
          url: null,
          title: "Editor Writings",
          description: null,
          people: [],
          category: null,
        };
        container.appendChild(createOrgCard(editorOrg, editorLinks));
      }
    }

    function createOrgCard(org, orgLinks) {
      var card = document.createElement("div");
      card.className = "org-card";

      // ─── Left: Org identity (whole section is clickable) ───
      var identity;
      if (org.url) {
        identity = document.createElement("a");
        identity.href = org.url;
        identity.target = "_blank";
        identity.rel = "noopener noreferrer";
      } else {
        identity = document.createElement("div");
      }
      identity.className = "org-identity";

      // Header with favicon + name
      var header = document.createElement("div");
      header.className = "org-header";

      if (org.url) {
        var favWrap = document.createElement("div");
        favWrap.className = "org-favicon";
        var favImg = document.createElement("img");
        favImg.src = faviconUrl(org.url);
        favImg.alt = "";
        favImg.loading = "lazy";
        favImg.onerror = function() { favImg.style.display = "none"; };
        favWrap.appendChild(favImg);
        header.appendChild(favWrap);
      }

      var name = document.createElement("div");
      name.className = "org-name";
      name.textContent = org.title || org.site_name || (org.url ? getDomain(org.url) : "Independent");
      header.appendChild(name);

      identity.appendChild(header);

      // Category badge
      if (org.category) {
        var badge = document.createElement("span");
        badge.className = "org-badge";
        badge.textContent = org.category;
        identity.appendChild(badge);
      }

      // Description
      if (org.description) {
        var desc = document.createElement("div");
        desc.className = "org-desc";
        desc.textContent = org.description;
        identity.appendChild(desc);
      }

      // URL display
      if (org.url) {
        var urlDisplay = document.createElement("div");
        urlDisplay.className = "org-url";
        urlDisplay.textContent = getDomain(org.url);
        identity.appendChild(urlDisplay);
      }

      // People
      if (org.people && org.people.length > 0) {
        var peopleLabel = document.createElement("div");
        peopleLabel.className = "org-people-label";
        peopleLabel.textContent = "Key People";
        identity.appendChild(peopleLabel);

        var peopleList = document.createElement("ul");
        peopleList.className = "org-people-list";
        org.people.forEach(function(person) {
          var li = document.createElement("li");
          li.textContent = person;
          peopleList.appendChild(li);
        });
        identity.appendChild(peopleList);
      }

      card.appendChild(identity);

      // ─── Right: Stacked link cards ───
      var linksContainer = document.createElement("div");
      linksContainer.className = "org-links";

      orgLinks.forEach(function(link) {
        linksContainer.appendChild(createOrgLinkCard(link));
      });

      card.appendChild(linksContainer);
      return card;
    }

    function createOrgLinkCard(link) {
      var domain = getDomain(link.url);
      var source = link.site_name || domain;
      var title = link.title || link.url;

      var a = document.createElement("a");
      a.className = "org-link-item";
      a.href = link.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";

      // Favicon
      var favWrap = document.createElement("div");
      favWrap.className = "org-link-favicon";
      var favImg = document.createElement("img");
      favImg.src = faviconUrl(link.url);
      favImg.alt = "";
      favImg.loading = "lazy";
      favImg.onerror = function() { favImg.style.display = "none"; };
      favWrap.appendChild(favImg);
      a.appendChild(favWrap);

      // Text
      var text = document.createElement("div");
      text.className = "org-link-text";

      // Meta line
      var meta = document.createElement("div");
      meta.className = "org-link-meta";

      var sourceEl = document.createElement("span");
      sourceEl.className = "org-link-source";
      sourceEl.textContent = source;
      meta.appendChild(sourceEl);

      text.appendChild(meta);

      // Title
      var h3 = document.createElement("div");
      h3.className = "org-link-title";
      h3.textContent = title;
      text.appendChild(h3);

      // Description
      var desc = link.description;
      if (desc && !isSameText(desc, title) && !isSameText(desc, source)) {
        var descEl = document.createElement("div");
        descEl.className = "org-link-desc";
        descEl.textContent = desc;
        text.appendChild(descEl);
      }

      a.appendChild(text);
      return a;
    }

    // ─── Newsletter signup ──────────────────────────────────────────
    (function() {
      var form = document.getElementById("newsletter-form");
      var msg = document.getElementById("newsletter-msg");

      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        var email = document.getElementById("newsletter-email").value.trim();
        if (!email) return;

        var btn = form.querySelector("button");
        btn.disabled = true;
        btn.textContent = "Subscribing...";
        msg.textContent = "";
        msg.className = "newsletter-msg";

        try {
          var resp = await fetch(WORKER_URL + "/api/subscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email }),
          });
          var data = await resp.json();
          if (resp.ok) {
            msg.textContent = "Yes! Check your email to confirm sign up!";
            msg.className = "newsletter-msg success";
            form.reset();
          } else {
            msg.textContent = data.error || "Something went wrong. Please try again.";
            msg.className = "newsletter-msg error";
          }
        } catch (err) {
          msg.textContent = "Network error. Please try again.";
          msg.className = "newsletter-msg error";
        }

        btn.disabled = false;
        btn.textContent = "Subscribe";
      });
    })();

    init();
  </script>
</body>
</html>
