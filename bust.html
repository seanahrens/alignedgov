<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Busted - Aligned Gov</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a href="/" class="nav-brand">Aligned Gov</a>
    <ul class="nav-links">
      <li><a href="/">Links</a></li>
      <li><a href="/orgs.html">Orgs</a></li>
      <li><a href="/editors.html">Editors</a></li>
      <li><a href="/submit.html">Submit a Resource</a></li>
    </ul>
  </div></nav>
  <main class="container">
    <div class="hero">
      <h1 id="status">Busting cache...</h1>
      <p class="description" id="msg">Hang tight.</p>
    </div>
  </main>
  <script>
    fetch("https://alignedgov-worker.seanahrens.workers.dev/bust")
      .then(function(r){ return r.json(); })
      .then(function(){
        document.getElementById("status").textContent = "Cache busted!";
        document.getElementById("msg").textContent = "Next page load will fetch fresh data from Google Sheets.";
      })
      .catch(function(){
        document.getElementById("status").textContent = "Something went wrong";
        document.getElementById("msg").textContent = "Try again or visit the worker URL directly.";
      });
  </script>
</body>
</html>
